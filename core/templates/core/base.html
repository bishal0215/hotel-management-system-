<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Waiter App{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar-brand { font-weight: bold; font-size: 1.1rem; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
        .badge-pill { border-radius: 99px; }
        @media (max-width: 576px) {
            .page-body { padding: 1rem !important; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3 py-2 sticky-top">
    <a class="navbar-brand" href="{% url 'dashboard' %}">🍽️ Waiter App</a>
    <div class="d-flex align-items-center gap-3">
        <a href="{% url 'kitchen' %}" class="text-white text-decoration-none small">
            <i class="bi bi-egg-fried"></i> Kitchen
        </a>
        <span class="text-secondary small">{{ request.user.username }}</span>
        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
    <div class="d-flex align-items-center gap-3">
    {% if request.user.profile.role == 'admin' %}
        <a href="{% url 'admin_dashboard' %}" class="text-white text-decoration-none small">
            <i class="bi bi-gear"></i> Admin
        </a>
    {% endif %}
    <a href="{% url 'kitchen' %}" class="text-white text-decoration-none small">
        <i class="bi bi-egg-fried"></i> Kitchen
    </a>
    <span class="text-secondary small">{{ request.user.username }}</span>
    <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<!-- Page Content -->
<div class="container-fluid page-body py-4 px-3 px-md-4" style="max-width:1200px;">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
